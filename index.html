<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}

.btn:hover{background:#30363d!important}
input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff!important}

</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Base64 Encoder / Decoder - 免费Online Tools","description":"在线 Base64 编Decode工具 - 文本/图片 Base64 EncodeDecode，支持文件Upload","url":"https://479464887-rgb.github.io/base64-tool/","applicationCategory":"DeveloperApplication","operatingSystem":"Web","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}
</script>
</head>
<body>
<header>
  <div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div>
  <div style="font-size:11px;color:#8b949e">🔒 Processed locally · 数据不Upload</div>
</header>
<main>
  <h1 style="font-size:24px;margin-bottom:4px">Base64 Encoder / Decoder</h1>
  <p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线 Base64 编Decode工具 - 文本/图片 Base64 EncodeDecode，支持文件Upload</p>
<div class="tool-wrapper">
  <div style="display:flex;gap:4px;margin-bottom:12px">
    <button class="tab-btn active" onclick="switchTab('encode')" id="tab-encode" style="flex:1;padding:10px;border:1px solid #58a6ff;border-radius:6px 6px 0 0;background:#1a2230;color:#58a6ff;cursor:pointer;font-size:13px;font-weight:600">🔒 Encode (Encode)</button>
    <button class="tab-btn" onclick="switchTab('decode')" id="tab-decode" style="flex:1;padding:10px;border:1px solid #30363d;border-radius:6px 6px 0 0;background:#161b22;color:#8b949e;cursor:pointer;font-size:13px;font-weight:600">🔓 Decode (Decode)</button>
  </div>
  <textarea id="b64-input" placeholder="Input要Encode的文字..." rows="6" style="width:100%;padding:16px;font-size:14px;border:1px solid #30363d;border-radius:0 0 8px 8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6"></textarea>
  <div style="display:flex;gap:8px;margin:12px 0">
    <input type="file" id="b64-file" style="display:none" onchange="handleFile(this)">
    <button class="btn" style="padding:10px 20px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;cursor:pointer;font-size:13px" onclick="document.getElementById('b64-file').click()">📁 Upload文件</button>
    <button class="btn btn-primary" style="flex:1;padding:10px;background:#238636;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600" onclick="processB64()" id="b64-action">🔒 Encode</button>
    <button class="btn" style="padding:10px 20px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;cursor:pointer;font-size:13px" onclick="copyB64()">📋 Copy</button>
  </div>
  <textarea id="b64-output" placeholder="结果将显示在这里..." readonly rows="8" style="width:100%;padding:16px;font-size:14px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6;min-height:150px"></textarea>
</div>
</main>
<footer>
  <a href="https://github.com/479464887-rgb/base64-tool">GitHub</a>
  <span>·</span>
  <span>© 2026 DevKit</span>
</footer>
<script>
'use strict';
let mode='encode';
function switchTab(m){mode=m;document.querySelectorAll('.tab-btn').forEach(b=>{b.style.borderColor='#30363d';b.style.background='#161b22';b.style.color='#8b949e';b.classList.remove('active')});const t=document.getElementById('tab-'+m);t.style.borderColor='#58a6ff';t.style.background='#1a2230';t.style.color='#58a6ff';t.classList.add('active');document.getElementById('b64-action').textContent=m==='encode'?'🔒 Encode':'🔓 Decode';document.getElementById('b64-input').placeholder=m==='encode'?'Input要Encode的文字...':'Input Base64 字符串...';}
function processB64(){
  const inp=document.getElementById('b64-input').value.trim();
  if(!inp)return;
  try{
    if(mode==='encode'){document.getElementById('b64-output').value=btoa(unescape(encodeURIComponent(inp)))}else{document.getElementById('b64-output').value=decodeURIComponent(escape(atob(inp)))}
  }catch(e){document.getElementById('b64-output').value='❌ '+e.message;}
}
function copyB64(){const v=document.getElementById('b64-output').value;if(!v)return;navigator.clipboard.writeText(v).then(()=>{const el=document.getElementById('b64-output');el.style.borderColor='#3fb950';setTimeout(()=>el.style.borderColor='#30363d',1000);});}
function handleFile(f){const file=f.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{document.getElementById('b64-input').value=reader.result.split(',')[1];mode='decode';switchTab('decode');processB64();};reader.readAsDataURL(file);}
</script>
</body>
